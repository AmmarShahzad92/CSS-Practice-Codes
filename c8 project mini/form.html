<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Form</title>
        <link rel="stylesheet" type="text/css" href="style/form.css" />
    </head>

    <body>
        <header>
            <h1>Form</h1>
        </header>

       <form action="get">
        <label for="Name">Name</label>
        <input type="text" autofocus required placeholder="(eg. Micheal)" autocomplete="on"><br><br>

        <label for="Email">Email</label>
        <input type="email" required placeholder="(eg. abc@gmail.com)" autocomplete="on"><br><br>

        <label for="Phone">Phone</label>
        <input type="tel" pattern="[+][0-9]{5}-[0-9]{7}" required placeholder="(eg. +92300-0000000)" autocomplete="on"><br><br>

       </form>

    </body>
</html
